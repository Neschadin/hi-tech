name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SITE_URL: https://hi-tech.ck.ua

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache dependencies and Next.js
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .next/cache
          key: ${{ runner.os }}-bun-next-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-next-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts') }}-
            ${{ runner.os }}-bun-next-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint and format check
        run: bunx biome ci

      - name: Typecheck
        run: bun run ts-check

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

  deploy:
    name: Deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: production
      cancel-in-progress: true
    permissions:
      contents: read
      deployments: write
    environment:
      name: Production
      url: ${{ env.SITE_URL }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Cache dependencies and Next.js
        uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .next/cache
          key: ${{ runner.os }}-bun-next-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-bun-next-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts') }}-
            ${{ runner.os }}-bun-next-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build OpenNext bundle
        run: bunx opennextjs-cloudflare build

      - name: Upload site worker version
        id: site_upload
        run: |
          bunx opennextjs-cloudflare upload -- \
            --tag "gha-${{ github.sha }}" \
            --message "GitHub Actions ${{ github.sha }}"
          VERSION_ID=$(bunx wrangler versions list --name hi-tech-ck-ua --json | jq -r '.[0].id')
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"

      - name: Gradual rollout — site worker (10% canary)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: versions deploy ${{ steps.site_upload.outputs.version_id }}@10 -y --name hi-tech-ck-ua --message "Canary 10% — ${{ github.sha }}"

      - name: Smoke test canary
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -fsS -o /dev/null -w '%{http_code}' "${{ env.SITE_URL }}/")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed"
          exit 1

      - name: Promote site worker to 100%
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: versions deploy ${{ steps.site_upload.outputs.version_id }}@100 -y --name hi-tech-ck-ua --message "Promote 100% — ${{ github.sha }}"

      - name: Upload status-proxy version
        id: proxy_upload
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: versions upload --config workers/status-proxy/wrangler.jsonc --tag gha-${{ github.sha }} --message "GitHub Actions ${{ github.sha }}"

      - name: Resolve status-proxy version id
        id: proxy_version
        run: |
          VERSION_ID=$(bunx wrangler versions list \
            --name hi-tech-status-proxy \
            --config workers/status-proxy/wrangler.jsonc \
            --json | jq -r '.[0].id')
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"

      - name: Promote status-proxy to 100%
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: versions deploy ${{ steps.proxy_version.outputs.version_id }}@100 -y --config workers/status-proxy/wrangler.jsonc --message "Promote 100% — ${{ github.sha }}"

      - name: Smoke test API
        run: |
          STATUS=$(curl -fsS -o /dev/null -w '%{http_code}' -X POST "${{ env.SITE_URL }}/api/repair-status" \
            -H 'Content-Type: application/json' \
            --data '{}')
          if [ "$STATUS" = "400" ]; then
            echo "API route alive (HTTP $STATUS on empty body)"
            exit 0
          fi
          echo "Unexpected API status: $STATUS"
          exit 1
