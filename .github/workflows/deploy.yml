name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts') }}-${{ github.sha }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts') }}-
            next-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run check

      - name: Typecheck
        run: bun run ts-check

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

  deploy:
    name: Deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts') }}-${{ github.sha }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('bun.lock', 'package.json', 'next.config.ts') }}-
            next-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build OpenNext bundle
        run: bunx opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

      - name: Upload site worker version
        id: site_upload
        run: |
          bunx opennextjs-cloudflare upload -- \
            --tag "gha-${{ github.sha }}" \
            --message "GitHub Actions ${{ github.sha }}"
          VERSION_ID=$(bunx wrangler versions list --name hi-tech-ck-ua --json | jq -r '.[0].id')
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Gradual rollout — site worker (10% canary)
        run: |
          bunx wrangler versions deploy "${{ steps.site_upload.outputs.version_id }}@10" -y \
            --name hi-tech-ck-ua \
            --message "Canary 10% — ${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test canary
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' https://hi-tech.ck.ua/)
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test passed (HTTP $STATUS)"
              exit 0
            fi
            sleep 5
          done
          echo "Smoke test failed"
          exit 1

      - name: Promote site worker to 100%
        run: |
          bunx wrangler versions deploy "${{ steps.site_upload.outputs.version_id }}@100" -y \
            --name hi-tech-ck-ua \
            --message "Promote 100% — ${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload status-proxy version
        id: proxy_upload
        run: |
          bunx wrangler versions upload \
            --config workers/status-proxy/wrangler.jsonc \
            --tag "gha-${{ github.sha }}" \
            --message "GitHub Actions ${{ github.sha }}"
          VERSION_ID=$(bunx wrangler versions list --name hi-tech-status-proxy --config workers/status-proxy/wrangler.jsonc --json | jq -r '.[0].id')
          echo "version_id=${VERSION_ID}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Promote status-proxy to 100%
        run: |
          bunx wrangler versions deploy "${{ steps.proxy_upload.outputs.version_id }}@100" -y \
            --config workers/status-proxy/wrangler.jsonc \
            --message "Promote 100% — ${{ github.sha }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test API
        run: |
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST https://hi-tech.ck.ua/api/repair-status \
            -H 'Content-Type: application/json' \
            --data '{}')
          if [ "$STATUS" = "400" ]; then
            echo "API route alive (HTTP $STATUS on empty body)"
            exit 0
          fi
          echo "Unexpected API status: $STATUS"
          exit 1
