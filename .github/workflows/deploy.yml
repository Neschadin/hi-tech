name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SITE_URL: https://hi-tech.ck.ua

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/cache@v5
        id: cache
        with:
          path: |
            ~/.bun/install/cache
            .next/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - run: bun install --frozen-lockfile
      - run: bunx biome ci
      - run: bun run ts-check
      - run: bun run build
        env:
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}

  deploy:
    name: Deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: production
      cancel-in-progress: true
    environment:
      name: Production
      url: ${{ env.SITE_URL }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            .next/cache
          key: ${{ runner.os }}-deps-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - run: bun install --frozen-lockfile

      # Same as local: opennext build+deploy + status-proxy
      - name: Deploy to Cloudflare
        run: bun run deploy

      - name: Smoke test
        run: |
          curl -fsS "${SITE_URL}/" >/dev/null
          test "$(curl -fsS -o /dev/null -w '%{http_code}' -X POST "${SITE_URL}/api/repair-status" \
            -H 'Content-Type: application/json' --data '{}')" = "400"
